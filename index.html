<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Alisha ❤️ Rajinder</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=Poppins&display=swap" rel="stylesheet">

<style>
body {
  margin:0;
  font-family:'Poppins', sans-serif;
  background:linear-gradient(to bottom,#fff5f7,#fdfaf6);
}

/* ENTRY SCREEN */
#entryScreen {
  position:fixed;
  width:100%;
  height:100%;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  background:#fff5f7;
  z-index:9999;
}

.enter-btn {
  padding:12px 25px;
  border:none;
  border-radius:25px;
  background:#d4a373;
  color:white;
}

/* MAIN */
#mainContent {
  display:none;
}

.hero {
  height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  text-align:center;
  background:url('https://images.unsplash.com/photo-1522673607200-164d1b6ce486');
  background-size:cover;
  color:white;
}

.section {
  padding:30px;
  text-align:center;
}

.card {
  background:white;
  margin:20px;
  padding:20px;
  border-radius:15px;
}

/* PETALS */
.petal {
  position:fixed;
  width:8px;
  height:8px;
  background:pink;
  border-radius:50%;
  top:-10px;
  animation:fall linear infinite;
}

@keyframes fall {
  to {
    transform:translateY(100vh);
  }
}
</style>
</head>

<body>

<!-- ENTRY -->
<div id="entryScreen">
  <h1>Alisha ❤️ Rajinder</h1>
  <button class="enter-btn" onclick="enterSite()">💍 Save the Date</button>
</div>

<!-- MAIN -->
<div id="mainContent">

<div class="hero">
  <h1>Ring Ceremony</h1>
  <p>18 April 2026 | 7 PM</p>
</div>

<div class="section">
  <h2 id="countdown"></h2>
</div>

<div class="section">
  <div class="card">
    <h3>Venue</h3>
    <p>Best Western Merrion</p>
    <a href="https://maps.app.goo.gl/VxLi1LGfHG9u6B4W6?g_st=aw">View Map</a>
  </div>
</div>

<div class="section">
  <button onclick="playMusic()">🎵 Play Music</button>
</div>

</div>

<audio id="bgMusic" loop>
  <source src="https://cdn.pixabay.com/audio/2022/03/15/audio_115b9b6b77.mp3">
</audio>

<script>
function enterSite(){
  document.getElementById("entryScreen").style.display="none";
  document.getElementById("mainContent").style.display="block";
  document.getElementById("bgMusic").play();
}

// countdown
const eventDate = new Date("April 18, 2026 19:00:00").getTime();
setInterval(()=>{
  const now = new Date().getTime();
  const gap = eventDate - now;

  const d = Math.floor(gap/(1000*60*60*24));
  const h = Math.floor((gap%(1000*60*60*24))/(1000*60*60));

  document.getElementById("countdown").innerHTML =
  d+" days "+h+" hours left";
},1000);

// petals
setInterval(()=>{
  const petal=document.createElement("div");
  petal.className="petal";
  petal.style.left=Math.random()*100+"vw";
  petal.style.animationDuration=(Math.random()*3+2)+"s";
  document.body.appendChild(petal);

  setTimeout(()=>petal.remove(),5000);
},300);

function playMusic(){
  document.getElementById("bgMusic").play();
}
</script>

</body>
</html>
