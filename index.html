<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Alisha ❤️ Rajinder</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=Poppins:wght@300;400&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  font-family:'Poppins',sans-serif;
  background:linear-gradient(to bottom,#fff5f7,#fdfaf6);
  overflow-x:hidden;
}

/* ENTRY SCREEN */
#entryScreen{
  position:fixed;
  width:100%;
  height:100%;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  background:linear-gradient(to bottom,#fff5f7,#fdfaf6);
  z-index:9999;
  text-align:center;
}

#entryScreen h1{
  font-family:'Playfair Display',serif;
  font-size:2rem;
}

.enter-btn{
  padding:12px 30px;
  border:none;
  border-radius:30px;
  background:#d4a373;
  color:white;
  font-size:15px;
  margin-top:15px;
}

/* MAIN */
#mainContent{
  display:none;
}

.hero{
  height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  text-align:center;
  padding:20px;
  background:linear-gradient(rgba(0,0,0,0.4),rgba(0,0,0,0.4)),
  url('https://images.unsplash.com/photo-1522673607200-164d1b6ce486');
  background-size:cover;
  background-position:center;
  color:white;
}

.hero h1{
  font-family:'Playfair Display',serif;
  font-size:2.2rem;
}

.hero p{
  font-size:1rem;
}

/* SECTIONS */
.section{
  padding:30px 15px;
  text-align:center;
}

.card{
  background:white;
  margin:auto;
  padding:20px;
  border-radius:15px;
  max-width:90%;
  box-shadow:0 5px 20px rgba(0,0,0,0.1);
}

.countdown{
  font-size:1.2rem;
  margin-top:10px;
}

/* PETALS */
.petal{
  position:fixed;
  top:-10px;
  width:8px;
  height:8px;
  background:pink;
  border-radius:50%;
  opacity:0.7;
  animation:fall linear infinite;
}

@keyframes fall{
  to{
    transform:translateY(100vh) translateX(50px);
  }
}

footer{
  text-align:center;
  padding:20px;
  font-size:0.8rem;
}
</style>
</head>

<body>

<!-- ENTRY -->
<div id="entryScreen">
  <h1>Alisha ❤️ Rajinder</h1>
  <p>Ring Ceremony</p>
  <button class="enter-btn" onclick="enterSite()">💍 Save the Date</button>
</div>

<!-- MAIN -->
<div id="mainContent">

<div class="hero">
  <h1>Alisha ❤️ Rajinder</h1>
  <p>18 April 2026 | 7 PM onwards</p>
</div>

<div class="section">
  <h2>Countdown</h2>
  <div class="countdown" id="countdown"></div>
</div>

<div class="section">
  <div class="card">
    <h2>Venue</h2>
    <p><b>Best Western Merrion</b></p>
    <p>Allure Banquet</p>
    <p>B Block, Ranjit Avenue, Amritsar</p>
    <a href="https://maps.app.goo.gl/VxLi1LGfHG9u6B4W6?g_st=aw">View Map</a>
  </div>
</div>

<footer>
  Made with ❤️ for Alisha & Rajinder
</footer>

</div>

<!-- MUSIC -->
<audio id="bgMusic" loop>
  <source src="https://cdn.pixabay.com/audio/2022/03/15/audio_115b9b6b77.mp3">
</audio>

<script>
function enterSite(){
  document.getElementById("entryScreen").style.display="none";
  document.getElementById("mainContent").style.display="block";

  let music=document.getElementById("bgMusic");
  music.play().catch(()=>{});
}

// countdown full
const eventDate=new Date("April 18, 2026 19:00:00").getTime();

setInterval(()=>{
  const now=new Date().getTime();
  const gap=eventDate-now;

  const d=Math.floor(gap/(1000*60*60*24));
  const h=Math.floor((gap%(1000*60*60*24))/(1000*60*60));
  const m=Math.floor((gap%(1000*60*60))/(1000*60));
  const s=Math.floor((gap%(1000*60))/1000);

  document.getElementById("countdown").innerHTML=
  d+"d "+h+"h "+m+"m "+s+"s";
},1000);

// petals
setInterval(()=>{
  const petal=document.createElement("div");
  petal.className="petal";
  petal.style.left=Math.random()*100+"vw";
  petal.style.animationDuration=(Math.random()*3+2)+"s";
  document.body.appendChild(petal);
  setTimeout(()=>petal.remove(),5000);
},300);
</script>

</body>
</html>
